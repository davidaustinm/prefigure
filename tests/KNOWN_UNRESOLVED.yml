# Annotated examples whose annotation ids do NOT all resolve to SVG element
# ids today. Each entry maps the snapshot id to the reason it fails.
#
# `test_snapshots.py::test_annotation_ids_resolve` verifies that every
# annotation id matches an element id in the built SVG — that lookup is what
# drives diagcess highlighting, so an unresolved id is a silently broken
# annotation. Entries here become STRICT xfails: when a fix (to the example
# source or to prefigure) makes an entry resolve, its test XPASSes and fails
# the suite until the entry is deleted from this file. To resolve an issue,
# fix the source/prefigure and remove the line here.
#
# Reason classes:
#
#   unprefixed-id-syntax
#     The source writes <annotation id="..."> instead of <annotation
#     ref="...">. prefigure prefixes every SVG element id with the file stem
#     but does not prefix annotation ids written with the id= syntax, so none
#     of the file's annotations resolve. Fix: convert the source to ref=
#     syntax, or fix the prefixing upstream in prefig/core/annotations.py.
#
#   stale-refs
#     The annotation refs use ids the implementation no longer generates:
#     riemann-sum terms are emitted as <handle>_<n> (underscore, see
#     prefig/core/riemann_sum.py), while the annotations reference
#     <handle>-<n> (hyphen). Fix: update the refs in the example source.
#
#   group-without-element
#     A grouping annotation references a handle that no element in the
#     diagram carries, so there is nothing to highlight (its children still
#     resolve). Fix: wrap the intended elements in a <group at="..."> with
#     that handle in the example source.

examples/extracted_from_docs/derivatives: unprefixed-id-syntax
examples/extracted_from_docs/implicit: unprefixed-id-syntax
examples/extracted_from_docs/network: unprefixed-id-syntax
examples/extracted_from_docs/projection: unprefixed-id-syntax
examples/extracted_from_docs/riemann: unprefixed-id-syntax + stale-refs
examples/extracted_from_docs/roots_of_unity: unprefixed-id-syntax
examples/extracted_from_docs/tan: unprefixed-id-syntax

examples/hand_crafted/riemann: stale-refs (riemann-sum-N vs riemann-sum_N)

examples/extracted_from_docs/diffeqs: group-without-element (diffeqs-solutions)
examples/extracted_from_docs/tangent-2: group-without-element (graph-tangent)
examples/extracted_from_docs/tangent-3: group-without-element (graph-tangent)
examples/extracted_from_docs/tangent-4: group-without-element (graph-tangent)
examples/extracted_from_docs/tangent-annotate: group-without-element (graph-tangent)
examples/extracted_from_docs/tangent-annotated: group-without-element (graph-tangent)
