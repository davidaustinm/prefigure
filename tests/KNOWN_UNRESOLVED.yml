# Annotated examples whose annotation ids do NOT all resolve to SVG element
# ids today. Each entry maps the snapshot id to the reason it fails.
#
# `test_snapshots.py::test_annotation_ids_resolve` verifies that every
# annotation id matches an element id in the built SVG — that lookup is what
# drives diagcess highlighting, so an unresolved id is a silently broken
# annotation. Entries here become STRICT xfails: when a fix (to the example
# source or to prefigure) makes an entry resolve, its test XPASSes and fails
# the suite until the entry is deleted from this file. To resolve an issue,
# fix the source/prefigure and remove the line here.
#
# Reason classes:
#
#   group-without-element
#     A grouping annotation references a handle that no element in the
#     diagram carries, so there is nothing to highlight (its children still
#     resolve). Fix: wrap the intended elements in a <group at="..."> with
#     that handle in the example source.

examples/extracted_from_docs/diffeqs: group-without-element (diffeqs-solutions)
examples/extracted_from_docs/tangent-2: group-without-element (graph-tangent)
examples/extracted_from_docs/tangent-3: group-without-element (graph-tangent)
